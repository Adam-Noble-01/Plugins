    <script>
        // =============================================================================
        // REGION | Global Configuration Constants - Single Source of Truth
        // =============================================================================
        // All configuration constants consolidated here for easy maintenance
        // and to prevent duplication across the codebase.
        // =============================================================================

        // -----------------------------------------------------------------------------
        // CAD / Window Configuration Constants
        // -----------------------------------------------------------------------------
        const CILL_HEIGHT        = 50;                                           // <-- Cill height (mm)
        const CILL_HORN_OVERHANG = 50;                                           // <-- Cill horn overhang each side (mm)
        const MIN_OPENING_WIDTH = 150;                                           // <-- Minimum opening width between mullions (mm)

        // -----------------------------------------------------------------------------
        // CAD Layer Name Constants
        // -----------------------------------------------------------------------------
        const LAYER_DEFAULT      = '95_01__WindowGen__Default__Layer0';          // <-- Default geometry layer
        const LAYER_CASEMENTS    = '95_02__WindowGen__CasementLines';            // <-- Casement lines layer
        const LAYER_GLAZEBARS    = '95_03__WindowGen__GlazeBars';                // <-- Glaze bars layer
        const LAYER_LEADLINES    = '95_04__WindowGen__LeadLines';                // <-- Lead lines layer
        const LAYER_DIMENSIONS   = '95_05__WindowGen__Dimensions';               // <-- Dimension annotations layer

        // -----------------------------------------------------------------------------
        // Dimension Line Constants
        // -----------------------------------------------------------------------------
        const DIM_OFFSET         = 100;                                          // <-- Dimension line offset from geometry (mm)
        const DIM_ARROW_SIZE     = 12;                                           // <-- Dimension arrow size (mm)

        // -----------------------------------------------------------------------------
        // Viewport / Camera Constants
        // -----------------------------------------------------------------------------
        const VIEWPORT_ZOOM_INTENSITY = 0.001;                                   // <-- Mouse wheel zoom sensitivity
        const VIEWPORT_MIN_SCALE      = 0.01;                                    // <-- Minimum zoom out level
        const VIEWPORT_MAX_SCALE      = 10;                                      // <-- Maximum zoom in level
        const VIEWPORT_FIT_PADDING    = 0.85;                                    // <-- Padding when fitting view to model (85% to show full drawing with margin)

        // -----------------------------------------------------------------------------
        // Color / Styling Constants
        // -----------------------------------------------------------------------------
        const COLOR_STROKE       = '#2c3e50';                                    // <-- Default geometry stroke color
        const COLOR_FILL         = 'none';                                       // <-- Default geometry fill
        const COLOR_FILL_DEFAULT = '#e8f5e9';                                    // <-- Default fill for Viewport module
        const COLOR_GROUND_LINE  = '#ff4444';                                    // <-- Ground reference line color
        const COLOR_AXIS_LINE    = '#00cc00';                                    // <-- Axis reference line color
        const COLOR_DIMENSION    = '#e74c3c';                                    // <-- Dimension lines and text color

        const STROKE_WIDTH           = 2;                                         // <-- Default stroke width
        const STROKE_WIDTH_CASEMENT  = STROKE_WIDTH / 2;                         // <-- Casement stroke width (thinner)
        const STROKE_WIDTH_LEADLINES = STROKE_WIDTH / 3;                         // <-- Lead lines stroke width (thinnest)
        const DIM_TEXT_SIZE_MM       = 40;                                       // <-- Dimension text height in CAD units (mm)

        // -----------------------------------------------------------------------------
        // Font Loading for CAD Text Geometry
        // -----------------------------------------------------------------------------
        let _cadFont = null;
        let _fontLoadPromise = null;

        // FUNCTION | Load CAD font for dimension text geometry
        // ------------------------------------------------------------
        // Loads TrueType font from CDN using opentype.js
        // Returns promise that resolves with font object
        // Font is cached in _cadFont for reuse
        // ------------------------------------------------------------
        function loadCADFont() {
            if (_fontLoadPromise) return _fontLoadPromise;
            
            _fontLoadPromise = new Promise((resolve, reject) => {
                const fontUrl = 'https://cdn.jsdelivr.net/npm/dejavu-fonts-ttf@2.37.3/ttf/DejaVuSans.ttf';
                opentype.load(fontUrl, function(err, font) {
                    if (err) {
                        console.error('Failed to load CAD font:', err);
                        reject(err);
                    } else {
                        _cadFont = font;
                        console.log('CAD font loaded successfully');
                        console.log('Font object:', _cadFont);
                        console.log('Bezier available?', typeof Bezier !== 'undefined');
                        resolve(font);
                    }
                });
            });
            
            return _fontLoadPromise;
        }
        // ---------------------------------------------------------------

        // endregion ===================================================================

        // =============================================================================
        // REGION | Script Configs
        // =============================================================================
        // UI configuration objects and viewport guides configuration
        // =============================================================================

        // -----------------------------------------------------------------------------
        // UI Configuration (JSON Config Header)
        // -----------------------------------------------------------------------------
        // INDEX: This config defines which UI elements are built
        // ┌────────────────────────────────────────────────────────────────────┐
        // │ INPUTS - Primary Row:                                              │
        // │   - windowWidth   : Window width in mm (600-4000)                  │
        // │   - windowHeight  : Window height in mm (400-3000)                 │
        // │   - mullions      : Number of mullions (vertical dividers) (0-6)   │
        // │   - hGlazeBars    : Horizontal glaze bars per opening (0-5)        │
        // │   - vGlazeBars    : Vertical glaze bars per opening (0-5)          │
        // │                                                                    │
        // │ INPUTS - Secondary Row:                                            │
        // │   - frameThickness : Main frame thickness (0-100mm)                │
        // │   - mullionWidth   : Mullion width (20-175mm)                      │
        // │   - glazeBarWidth  : Glaze bar width (10-50mm)                     │
        // │   - showCill       : Toggle for window cill                        │
        // │                                                                    │
        // │ BUTTONS:                                                           │
        // │   - reset-btn     : Resets view and opening widths to even        │
        // │   - dxf-btn       : Downloads DXF file                             │
        // └────────────────────────────────────────────────────────────────────┘
        const UI_CONFIG = {
            containerId:      'controls',
            statusBarId:      'status-bar',
            canvasWrapperId:  'canvas-wrapper',
            loadingText:      'Loading CAD Libraries...',
            
            inputs: [
                { id: 'windowWidth',  label: 'Width',     default: 1800, min: 600,  max: 4000, step: 5, unit: 'mm', onChange: 'onParamChange',   width: '140px' },
                { id: 'windowHeight', label: 'Height',    default: 1200, min: 400,  max: 3000, step: 5, unit: 'mm', onChange: 'onParamChange',   width: '140px' },
                { id: 'mullions',     label: 'Mullions',  default: 1,    min: 0,    max: 6,    step: 1,  unit: '',   onChange: 'onMullionChange', width: '100px' },
                { id: 'hGlazeBars',   label: 'H Bars',    default: 1,    min: 0,    max: 5,    step: 1,  unit: '',   onChange: 'onParamChange',   width: '90px'  },
                { id: 'vGlazeBars',   label: 'V Bars',    default: 1,    min: 0,    max: 5,    step: 1,  unit: '',   onChange: 'onParamChange',   width: '90px'  }
            ],
            
            buttons: [
                { id: 'reset-btn', label: 'Reset View',    action: 'onReset',       style: 'primary' },
                { id: 'dxf-btn',   label: 'Download DXF',  action: 'onDownloadDXF', style: 'success' }
            ]
        };

        // Secondary controls config (built manually for toggle support)
        const SECONDARY_CONFIG = {
            containerId: 'controls-secondary',
            inputs: [
                { id: 'frameThickness', label: 'Frame',      default: 50,  min: 0,   max: 100, step: 5,  unit: 'mm' },
                { id: 'mullionWidth',   label: 'Mullion',    default: 40,  min: 20,  max: 100, step: 5,  unit: 'mm' },
                { id: 'glazeBarWidth',  label: 'Glaze Bar',  default: 25,  min: 10,  max: 50,  step: 1,  unit: 'mm' }
            ],
            toggles: [
                { id: 'showCill', label: 'Window Cill', default: true },
                { id: 'showDimensions', label: 'Dimensions', default: true }
            ],
            casements: [
                { id: 'showCasements', label: 'Casements', default: false },
                { id: 'casementInset', label: 'Casement Inset', default: 65, min: 20, max: 150, step: 5, unit: 'mm', enabledBy: 'showCasements' }
            ],
            leadLines: [
                { id: 'showLeadLines', label: 'Lead Lines', default: false },
                { id: 'leadLinesVDivisions', label: 'V Panel Divisions', default: 0, min: 0, max: 10, step: 1, unit: '', enabledBy: 'showLeadLines' },
                { id: 'leadLinesHDivisions', label: 'H Panel Divisions', default: 0, min: 0, max: 10, step: 1, unit: '', enabledBy: 'showLeadLines' },
                { id: 'leadLinesThickness', label: 'Thickness', default: 0, min: 0, max: 20, step: 1, unit: 'mm', enabledBy: 'showLeadLines' }
            ]
        };

        // -----------------------------------------------------------------------------
        // Global State Variables
        // -----------------------------------------------------------------------------
        let currentModel     = null;                                             // <-- Current Maker.js model
        let frameworkOpeningWidths__BetweenMullions = [];                        // <-- Individual opening widths between mullions

        // -----------------------------------------------------------------------------
        // Viewport Guides Configuration
        // -----------------------------------------------------------------------------
        const guidesConfig = {                                                   // <-- Viewport guides config
            showGround:  false,
            showAxis:    false,
            strokeColor: COLOR_STROKE,
            strokeWidth: STROKE_WIDTH,
            fillColor:   COLOR_FILL,
            layerOptions: {                                                      // <-- Layer-specific styling
                [LAYER_DIMENSIONS]: { 
                    stroke: COLOR_DIMENSION,                                     // <-- Red dimension lines
                    fill:   COLOR_DIMENSION                                      // <-- Red dimension text
                }
            }
        };

        // endregion ===================================================================

        // =====================================================================
        // REGION | CadGenerator - Dynamic UI Module (INLINED)
        // =====================================================================
        (function() {
            'use strict';

            let _config = null;
            let _handlers = {};
            let _stylesInjected = false;
            let _containerEl = null;
            let _statusBarEl = null;
            let _canvasWrapperEl = null;
            let _inputElements = {};

            function injectStyles(customStyles = '') {
                if (_stylesInjected) return;
                // Only inject custom styles if provided (base styles are in external CSS)
                if (customStyles && customStyles.trim()) {
                    const styleEl = document.createElement('style');
                    styleEl.id = 'cad-generator-dynamic-ui-custom-styles';
                    styleEl.textContent = customStyles;
                    document.head.appendChild(styleEl);
                }
                _stylesInjected = true;
            }

            function build(config, handlers = {}) {
                _config = config;
                _handlers = handlers;
                _inputElements = {};

                injectStyles(config.styles?.custom || '');

                if (config.containerId) {
                    _containerEl = document.getElementById(config.containerId);
                    if (_containerEl) {
                        _containerEl.classList.add('cad-controls');
                        _containerEl.innerHTML = '';

                        if (config.inputs && Array.isArray(config.inputs)) {
                            // Create first row container for inputs + buttons
                            const firstRow = document.createElement('div');
                            firstRow.classList.add('cad-controls-first-row');
                            
                            for (let i = 0; i < config.inputs.length; i++) {
                                const inputDef = config.inputs[i];
                                const inputGroup = buildSliderInput(inputDef);
                                
                                if (i < 5) {
                                    // First 5 inputs go in first row
                                    firstRow.appendChild(inputGroup);
                                    
                                    // Insert buttons after the 5th input (vGlazeBars) - index 4
                                    if (i === 4 && config.buttons && Array.isArray(config.buttons)) {
                                        for (const btnDef of config.buttons) {
                                            const btnGroup = buildButton(btnDef);
                                            firstRow.appendChild(btnGroup);
                                        }
                                    }
                                } else {
                                    // Remaining inputs go directly to main container
                                    _containerEl.appendChild(inputGroup);
                                }
                            }
                            
                            // Append first row to container
                            if (firstRow.children.length > 0) {
                                _containerEl.appendChild(firstRow);
                            }
                        }
                    }
                }

                if (config.statusBarId) {
                    _statusBarEl = document.getElementById(config.statusBarId);
                    if (_statusBarEl) {
                        _statusBarEl.classList.add('cad-status-bar');
                    }
                }

                if (config.canvasWrapperId) {
                    _canvasWrapperEl = document.getElementById(config.canvasWrapperId);
                    if (_canvasWrapperEl) {
                        _canvasWrapperEl.classList.add('cad-canvas-wrapper');
                        if (config.loadingText) {
                            _canvasWrapperEl.innerHTML = `<span class="cad-loading-text">${config.loadingText}</span>`;
                        }
                    }
                }

                return true;
            }

            function buildSliderInput(def) {
                const group = document.createElement('div');
                group.classList.add('cad-input-group');
                
                if (def.width) {
                    group.style.minWidth = def.width;
                }

                const label = document.createElement('label');
                label.htmlFor = def.id;
                label.textContent = def.label || def.id;
                group.appendChild(label);

                const sliderContainer = document.createElement('div');
                sliderContainer.classList.add('cad-slider-container');

                const sliderRow = document.createElement('div');
                sliderRow.classList.add('cad-slider-row');

                const slider = document.createElement('input');
                slider.type = 'range';
                slider.id = def.id;
                slider.min = def.min !== undefined ? def.min : 0;
                slider.max = def.max !== undefined ? def.max : 100;
                slider.step = def.step !== undefined ? def.step : 1;
                slider.value = def.default !== undefined ? def.default : 50;

                const valueDisplay = document.createElement('div');
                valueDisplay.classList.add('cad-value-display');
                valueDisplay.dataset.inputId = def.id;
                updateValueDisplay(valueDisplay, slider.value, def.unit);

                _inputElements[def.id] = {
                    slider: slider,
                    valueDisplay: valueDisplay,
                    def: def
                };

                slider.addEventListener('input', () => {
                    let value = parseFloat(slider.value);
                    
                    // Snap to 5mm increments for windowWidth and windowHeight
                    if (def.id === 'windowWidth' || def.id === 'windowHeight') {
                        value = Math.round(value / 5) * 5;
                        slider.value = value;
                    }
                    
                    updateValueDisplay(valueDisplay, slider.value, def.unit);
                    if (def.onChange && _handlers[def.onChange]) {
                        _handlers[def.onChange](def.id, value);
                    }
                });

                valueDisplay.addEventListener('dblclick', () => {
                    showTextInput(def, slider, valueDisplay);
                });

                sliderRow.appendChild(slider);
                sliderRow.appendChild(valueDisplay);
                sliderContainer.appendChild(sliderRow);

                if (def.hint) {
                    const hint = document.createElement('span');
                    hint.classList.add('cad-hint');
                    hint.textContent = def.hint;
                    sliderContainer.appendChild(hint);
                }

                group.appendChild(sliderContainer);
                return group;
            }

            function updateValueDisplay(displayEl, value, unit) {
                const numValue = parseFloat(value);
                const formatted = Number.isInteger(numValue) ? numValue : numValue.toFixed(1);
                
                if (unit) {
                    displayEl.innerHTML = `${formatted}<span class="cad-unit">${unit}</span>`;
                } else {
                    displayEl.textContent = formatted;
                }
            }

            function showTextInput(def, slider, valueDisplay) {
                const textInput = document.createElement('input');
                textInput.type = 'number';
                textInput.classList.add('cad-value-input');
                textInput.min = def.min !== undefined ? def.min : '';
                textInput.max = def.max !== undefined ? def.max : '';
                
                // Allow any integer input for windowWidth/windowHeight, otherwise use step
                if (def.id === 'windowWidth' || def.id === 'windowHeight') {
                    textInput.step = 'any';
                } else {
                    textInput.step = def.step !== undefined ? def.step : 'any';
                }
                
                textInput.value = slider.value;

                valueDisplay.style.display = 'none';
                valueDisplay.parentNode.insertBefore(textInput, valueDisplay.nextSibling);
                textInput.focus();
                textInput.select();

                const commitValue = () => {
                    let newValue = parseFloat(textInput.value);
                    
                    // Round to integer for windowWidth/windowHeight
                    if (def.id === 'windowWidth' || def.id === 'windowHeight') {
                        newValue = Math.round(newValue);
                    }
                    
                    if (def.min !== undefined && newValue < def.min) newValue = def.min;
                    if (def.max !== undefined && newValue > def.max) newValue = def.max;
                    
                    if (isNaN(newValue)) {
                        newValue = def.default !== undefined ? def.default : def.min || 0;
                    }

                    slider.value = newValue;
                    updateValueDisplay(valueDisplay, newValue, def.unit);

                    textInput.remove();
                    valueDisplay.style.display = '';

                    if (def.onChange && _handlers[def.onChange]) {
                        _handlers[def.onChange](def.id, newValue);
                    }
                };

                textInput.addEventListener('blur', commitValue);
                textInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        textInput.blur();
                    }
                    if (e.key === 'Escape') {
                        textInput.value = slider.value;
                        textInput.blur();
                    }
                });
            }

            function buildButton(def) {
                const group = document.createElement('div');
                group.classList.add('cad-input-group');
                group.classList.add('cad-button-group');

                const btn = document.createElement('button');
                btn.id = def.id;
                btn.textContent = def.label || 'Button';
                btn.classList.add('cad-btn');

                const styleClass = `cad-btn--${def.style || 'primary'}`;
                btn.classList.add(styleClass);

                if (def.action && _handlers[def.action]) {
                    btn.addEventListener('click', _handlers[def.action]);
                } else if (def.action) {
                    btn.addEventListener('click', () => {
                    });
                }

                group.appendChild(btn);
                return group;
            }

            function getValue(inputId) {
                if (_inputElements[inputId]) {
                    return parseFloat(_inputElements[inputId].slider.value);
                }

                const el = document.getElementById(inputId);
                if (!el) return null;

                if (el.type === 'number' || el.type === 'range') {
                    return parseFloat(el.value);
                }
                if (el.type === 'checkbox') {
                    return el.checked;
                }
                return el.value;
            }

            function setValue(inputId, value) {
                if (_inputElements[inputId]) {
                    const { slider, valueDisplay, def } = _inputElements[inputId];
                    slider.value = value;
                    updateValueDisplay(valueDisplay, value, def.unit);
                    return true;
                }

                const el = document.getElementById(inputId);
                if (!el) return false;

                if (el.type === 'checkbox') {
                    el.checked = !!value;
                } else {
                    el.value = value;
                }
                return true;
            }

            function getAllValues() {
                if (!_config || !_config.inputs) return {};
                const values = {};
                for (const inputDef of _config.inputs) {
                    values[inputDef.id] = getValue(inputDef.id);
                }
                return values;
            }

            function setStatus(message) {
                if (_statusBarEl) {
                    _statusBarEl.textContent = message;
                }
            }

            function showLoading(show, message = 'Loading...') {
                if (!_canvasWrapperEl) return;

                if (show) {
                    let loadingEl = _canvasWrapperEl.querySelector('.cad-loading-text');
                    if (!loadingEl) {
                        loadingEl = document.createElement('span');
                        loadingEl.classList.add('cad-loading-text');
                        _canvasWrapperEl.appendChild(loadingEl);
                    }
                    loadingEl.textContent = message;
                    loadingEl.style.display = 'block';
                } else {
                    const loadingEl = _canvasWrapperEl.querySelector('.cad-loading-text');
                    if (loadingEl) {
                        loadingEl.style.display = 'none';
                    }
                }
            }

            function getConfig() {
                return _config;
            }

            function getContainer() {
                return _containerEl;
            }

            function getCanvasWrapper() {
                return _canvasWrapperEl;
            }

            function registerHandler(name, fn) {
                _handlers[name] = fn;
            }

            window.CadGenerator = window.CadGenerator || {};
            window.CadGenerator.DynamicUI = {
                build,
                getValue,
                setValue,
                getAllValues,
                setStatus,
                showLoading,
                getConfig,
                getContainer,
                getCanvasWrapper,
                registerHandler
            };
        })();
        // endregion ===============================================================
    </script>

    <script>
        // -----------------------------------------------------------------------------
        // REGION | CadGenerator - Viewport Module (INLINED - Unified UCS)
        // -----------------------------------------------------------------------------

        // MODULE CONSTANTS | Default Viewport Configuration
        // ------------------------------------------------------------
        const DEFAULT_CONFIG = {
            zoomIntensity    : VIEWPORT_ZOOM_INTENSITY,                   // <-- Zoom intensity multiplier
            minScale         : VIEWPORT_MIN_SCALE,                        // <-- Minimum zoom scale
            maxScale         : VIEWPORT_MAX_SCALE,                        // <-- Maximum zoom scale
            fitPadding       : VIEWPORT_FIT_PADDING,                      // <-- Padding for fit-to-view
            strokeColor      : COLOR_STROKE,                             // <-- Default stroke color
            strokeWidth      : STROKE_WIDTH,                             // <-- Default stroke width
            fillColor        : COLOR_FILL_DEFAULT,                        // <-- Default fill color
            groundLineColor  : COLOR_GROUND_LINE,                         // <-- Ground line color
            axisLineColor    : COLOR_AXIS_LINE,                          // <-- Axis line color
            showGroundLine   : true,                                      // <-- Show ground line flag
            showAxisLine     : true                                       // <-- Show axis line flag
        };
        // ------------------------------------------------------------


        // MODULE VARIABLES | Viewport State and DOM References
        // ------------------------------------------------------------
        let _wrapperId          = null;                                  // <-- Wrapper element ID
        let _wrapperEl          = null;                                  // <-- Wrapper DOM element reference
        let _svgEl              = null;                                   // <-- SVG element reference
        let _currentModel       = null;                                   // <-- Current Maker.js model
        let _config             = { ...DEFAULT_CONFIG };                  // <-- Viewport configuration object
        let _camState           = { x: 0, y: 0, scale: 1 };              // <-- Camera state (x, y, scale)
        let _isDragging         = false;                                  // <-- Mouse drag state flag
        let _lastMouse          = { x: 0, y: 0 };                        // <-- Last mouse position
        let _modelBounds        = null;                                   // <-- Model bounding box
        let _onRenderCallback   = null;                                   // <-- Render callback function
        let _onCameraChangeCallback = null;                               // <-- Camera change callback function
        let _isInitialized      = false;                                   // <-- Initialization flag
        // ------------------------------------------------------------


        // HELPER FUNCTION | Get Maker.js Library Reference
        // ------------------------------------------------------------
        function getMakerJS() {
            if (window.makerjs) return window.makerjs;                    // <-- Check global makerjs
            if (window.require) {                                         // <-- Check require.js
                try { return window.require('makerjs'); } catch(e) {}    // <-- Try require makerjs
            }
            return null;                                                  // <-- Return null if not found
        }
        // ------------------------------------------------------------


        // FUNCTION | Update Camera Transform on SVG Element
        // ------------------------------------------------------------
        function updateCameraTransform() {
            const g = document.getElementById('camera-group');            // <-- Get camera group element
            if (!g) return;                                               // <-- Exit if element not found
            
            // Ensure _camState exists and has valid structure
            if (!_camState || typeof _camState !== 'object') {           // <-- Validate camera state object
                _camState = { x: 0, y: 0, scale: 1 };                    // <-- Initialize default state
            }
            
            // Validate camera state values before applying transform
            const x     = (typeof _camState.x === 'number' && isFinite(_camState.x)) ? _camState.x : 0;                    // <-- Validate x position
            const y     = (typeof _camState.y === 'number' && isFinite(_camState.y)) ? _camState.y : 0;                    // <-- Validate y position
            const scale = (typeof _camState.scale === 'number' && isFinite(_camState.scale) && _camState.scale > 0) ? _camState.scale : 1;  // <-- Validate scale
            
            // Apply Y-flip to camera view (negative scale on Y-axis)
            g.setAttribute('transform', `translate(${x}, ${y}) scale(${scale}, ${-scale})`);  // <-- Apply transform
            
            // Notify listeners of camera change
            if (_onCameraChangeCallback) {                                // <-- Check if callback exists
                _onCameraChangeCallback({ ..._camState });                // <-- Call camera change callback
            }
        }
        // ------------------------------------------------------------


        // FUNCTION | Get Current Camera State
        // ------------------------------------------------------------
        function getState() {
            return { ..._camState };                                      // <-- Return copy of camera state
        }
        // ------------------------------------------------------------


        // FUNCTION | Set Camera State
        // ------------------------------------------------------------
        function setState(newState) {
            if (!newState || typeof newState !== 'object') return;        // <-- Validate input state
            
            // Ensure _camState exists
            if (!_camState || typeof _camState !== 'object') {            // <-- Validate camera state object
                _camState = { x: 0, y: 0, scale: 1 };                    // <-- Initialize default state
            }
            
            // Validate and merge new state
            const validatedState = {};                                    // <-- Create validated state object
            if ('x' in newState && typeof newState.x === 'number' && isFinite(newState.x)) {     // <-- Validate x
                validatedState.x = newState.x;                            // <-- Set validated x
            }
            if ('y' in newState && typeof newState.y === 'number' && isFinite(newState.y)) {     // <-- Validate y
                validatedState.y = newState.y;                            // <-- Set validated y
            }
            if ('scale' in newState && typeof newState.scale === 'number' && isFinite(newState.scale) && newState.scale > 0) {  // <-- Validate scale
                validatedState.scale = newState.scale;                     // <-- Set validated scale
            }
            
            _camState = { ..._camState, ...validatedState };              // <-- Merge validated state
            updateCameraTransform();                                      // <-- Apply transform
        }
        // ------------------------------------------------------------


        // FUNCTION | Fit Model to Viewport
        // ------------------------------------------------------------
        function fitToView() {
            if (!_modelBounds || !_wrapperEl || !_svgEl) return;          // <-- Validate required elements
            
            if (!_modelBounds.low || !_modelBounds.high ||                // <-- Validate bounds structure
                !Array.isArray(_modelBounds.low) || !Array.isArray(_modelBounds.high) ||
                _modelBounds.low.length < 2 || _modelBounds.high.length < 2) {
                return;                                                   // <-- Exit if invalid bounds
            }
            
            const lowX  = Number(_modelBounds.low[0]);                   // <-- Get low X coordinate
            const lowY  = Number(_modelBounds.low[1]);                   // <-- Get low Y coordinate
            const highX = Number(_modelBounds.high[0]);                   // <-- Get high X coordinate
            const highY = Number(_modelBounds.high[1]);                   // <-- Get high Y coordinate
            
            if (!isFinite(lowX) || !isFinite(lowY) || !isFinite(highX) || !isFinite(highY)) {  // <-- Validate coordinates
                return;                                                   // <-- Exit if invalid
            }
            
            setTimeout(() => {
                if (!_modelBounds || !_wrapperEl || !_svgEl) return;      // <-- Re-validate elements
                
                const rect = _wrapperEl.getBoundingClientRect();          // <-- Get wrapper dimensions
                const viewportWidth  = rect.width;                        // <-- Get viewport width
                const viewportHeight = rect.height;                        // <-- Get viewport height
                
                if (!viewportWidth || !viewportHeight || viewportWidth <= 0 || viewportHeight <= 0 || 
                    !isFinite(viewportWidth) || !isFinite(viewportHeight)) {  // <-- Validate dimensions
                    return;                                               // <-- Exit if invalid
                }
                
                if (!_modelBounds.low || !_modelBounds.high) return;     // <-- Re-validate bounds
                
                const modelLowX  = Number(_modelBounds.low[0]);          // <-- Get model low X
                const modelLowY  = Number(_modelBounds.low[1]);          // <-- Get model low Y
                const modelHighX = Number(_modelBounds.high[0]);          // <-- Get model high X
                const modelHighY = Number(_modelBounds.high[1]);          // <-- Get model high Y
                
                if (!isFinite(modelLowX) || !isFinite(modelLowY) || !isFinite(modelHighX) || !isFinite(modelHighY)) {  // <-- Validate model coordinates
                    return;                                               // <-- Exit if invalid
                }
                
                const modelWidth  = modelHighX - modelLowX;               // <-- Calculate model width
                const modelHeight = modelHighY - modelLowY;               // <-- Calculate model height
                
                if (modelWidth <= 0 || modelHeight <= 0) return;          // <-- Validate model dimensions
                
                const scaleX = (viewportWidth * _config.fitPadding) / modelWidth;   // <-- Calculate X scale
                const scaleY = (viewportHeight * _config.fitPadding) / modelHeight;  // <-- Calculate Y scale
                const scale  = Math.min(scaleX, scaleY) * 0.2;            // <-- Calculate final scale (zoom out 2x)
                
                if (!isFinite(scale) || scale <= 0) return;              // <-- Validate scale
                
                const clampedScale = Math.max(_config.minScale, Math.min(_config.maxScale, scale));  // <-- Clamp scale to limits
                
                if (!isFinite(clampedScale) || clampedScale <= 0) return; // <-- Validate clamped scale
                
                const centerX      = viewportWidth / 2;                  // <-- Calculate viewport center X
                const centerY      = viewportHeight / 2;                  // <-- Calculate viewport center Y
                const modelCenterX = (modelLowX + modelHighX) / 2;        // <-- Calculate model center X
                const modelCenterY = (modelLowY + modelHighY) / 2;        // <-- Calculate model center Y
                
                const newX = centerX - modelCenterX * clampedScale;      // <-- Calculate new camera X
                const newY = centerY + modelCenterY * clampedScale;       // <-- Calculate new camera Y
                
                if (isFinite(newX) && isFinite(newY) && isFinite(clampedScale) && clampedScale > 0) {  // <-- Validate final values
                    _camState = {                                         // <-- Set camera state
                        x: newX,
                        y: newY,
                        scale: clampedScale
                    };
                    updateCameraTransform();                              // <-- Apply transform
                }
            }, 100);                                                      // <-- Delay to ensure DOM is ready
        }
        // ------------------------------------------------------------


        // FUNCTION | Setup Mouse and Wheel Interaction Handlers
        // ------------------------------------------------------------
        function setupInteraction(svgEl) {
            if (!svgEl) return;                                           // <-- Exit if element not provided
            
            svgEl.addEventListener('wheel', handleWheel, { passive: false });     // <-- Add wheel event listener
            svgEl.addEventListener('mousedown', handleMouseDown);          // <-- Add mousedown event listener
            window.addEventListener('mousemove', handleMouseMove);        // <-- Add mousemove event listener
            window.addEventListener('mouseup', handleMouseUp);            // <-- Add mouseup event listener
        }
        // ------------------------------------------------------------


        // FUNCTION | Handle Mouse Wheel Zoom
        // ------------------------------------------------------------
        function handleWheel(e) {
            e.preventDefault();                                           // <-- Prevent default scroll behavior
            
            // Ensure _camState is valid
            if (!_camState || typeof _camState !== 'object') {            // <-- Validate camera state object
                _camState = { x: 0, y: 0, scale: 1 };                    // <-- Initialize default state
            }
            if (!isFinite(_camState.scale) || _camState.scale <= 0) {     // <-- Validate scale
                _camState.scale = 1;                                      // <-- Reset scale
            }
            if (!isFinite(_camState.x)) {                                 // <-- Validate x position
                _camState.x = 0;                                         // <-- Reset x
            }
            if (!isFinite(_camState.y)) {                                 // <-- Validate y position
                _camState.y = 0;                                         // <-- Reset y
            }
            
            const delta       = e.deltaY;                                 // <-- Get wheel delta
            const scaleFactor = 1 - delta * _config.zoomIntensity;        // <-- Calculate scale factor
            
            const rect    = _wrapperEl.getBoundingClientRect();           // <-- Get wrapper bounds
            const mouseX  = e.clientX - rect.left;                        // <-- Calculate mouse X relative to wrapper
            const mouseY  = e.clientY - rect.top;                         // <-- Calculate mouse Y relative to wrapper
            
            const worldX = (mouseX - _camState.x) / _camState.scale;      // <-- Convert to world X coordinate
            const worldY = (mouseY - _camState.y) / _camState.scale;      // <-- Convert to world Y coordinate
            
            _camState.scale *= scaleFactor;                               // <-- Apply scale change
            _camState.scale = Math.max(_config.minScale, Math.min(_config.maxScale, _camState.scale));  // <-- Clamp scale
            
            const newX = mouseX - worldX * _camState.scale;               // <-- Calculate new camera X
            const newY = mouseY - worldY * _camState.scale;               // <-- Calculate new camera Y
            
            if (isFinite(newX)) {                                         // <-- Validate new X
                _camState.x = newX;                                       // <-- Set camera X
            }
            if (isFinite(newY)) {                                         // <-- Validate new Y
                _camState.y = newY;                                       // <-- Set camera Y
            }
            
            updateCameraTransform();                                      // <-- Apply transform
        }
        // ------------------------------------------------------------


        // FUNCTION | Handle Mouse Down Event
        // ------------------------------------------------------------
        function handleMouseDown(e) {
            if (e.button === 0 || e.button === 1) {                      // <-- Check for left or middle button
                _isDragging = true;                                       // <-- Set dragging flag
                _lastMouse = { x: e.clientX, y: e.clientY };              // <-- Store mouse position
                document.body.style.cursor = 'grabbing';                 // <-- Change cursor to grabbing
            }
        }
        // ------------------------------------------------------------


        // FUNCTION | Handle Mouse Move Event
        // ------------------------------------------------------------
        function handleMouseMove(e) {
            if (!_isDragging) return;                                     // <-- Exit if not dragging
            
            // Ensure _camState is valid
            if (!_camState || typeof _camState !== 'object') {            // <-- Validate camera state object
                _camState = { x: 0, y: 0, scale: 1 };                    // <-- Initialize default state
            }
            if (!isFinite(_camState.x)) {                                 // <-- Validate x position
                _camState.x = 0;                                         // <-- Reset x
            }
            if (!isFinite(_camState.y)) {                                 // <-- Validate y position
                _camState.y = 0;                                         // <-- Reset y
            }
            
            const dx = e.clientX - _lastMouse.x;                          // <-- Calculate X delta
            const dy = e.clientY - _lastMouse.y;                          // <-- Calculate Y delta
            _lastMouse = { x: e.clientX, y: e.clientY };                  // <-- Update last mouse position
            
            const newX = _camState.x + dx;                                // <-- Calculate new camera X
            const newY = _camState.y + dy;                                // <-- Calculate new camera Y
            
            if (isFinite(newX)) {                                         // <-- Validate new X
                _camState.x = newX;                                       // <-- Set camera X
            }
            if (isFinite(newY)) {                                         // <-- Validate new Y
                _camState.y = newY;                                       // <-- Set camera Y
            }
            
            updateCameraTransform();                                      // <-- Apply transform
        }
        // ------------------------------------------------------------


        // FUNCTION | Handle Mouse Up Event
        // ------------------------------------------------------------
        function handleMouseUp() {
            _isDragging = false;                                          // <-- Clear dragging flag
            document.body.style.cursor = '';                              // <-- Reset cursor
        }
        // ------------------------------------------------------------


        // FUNCTION | Initialize Viewport
        // ------------------------------------------------------------
        function init(wrapperId, options = {}) {
            _wrapperId = wrapperId;                                       // <-- Store wrapper ID
            _wrapperEl = document.getElementById(wrapperId);             // <-- Get wrapper element
            
            if (!_wrapperEl) {                                            // <-- Check if element exists
                return false;                                             // <-- Return false if not found
            }
            
            _config = { ...DEFAULT_CONFIG, ...options };                  // <-- Merge config with options
            
            _wrapperEl.style.overflow   = 'hidden';                       // <-- Set overflow style
            _wrapperEl.style.position   = 'relative';                     // <-- Set position style
            _wrapperEl.style.cursor     = 'grab';                         // <-- Set cursor style
            _wrapperEl.style.userSelect = 'none';                         // <-- Disable text selection
            
            _camState     = { x: 0, y: 0, scale: 1 };                    // <-- Reset camera state
            _isDragging   = false;                                        // <-- Reset dragging flag
            _isInitialized = false;                                       // <-- Reset initialization flag
            
            return true;                                                  // <-- Return success
        }
        // ------------------------------------------------------------


        // FUNCTION | Render Maker.js Model with Guides
        // ------------------------------------------------------------
        function render(makerModel, guides = {}, options = {}) {
            const M = getMakerJS();                                       // <-- Get Maker.js library
            if (!M) return false;                                         // <-- Exit if library not found
            if (!_wrapperEl) return false;                               // <-- Exit if wrapper not initialized
            
            const preserveCamera = options.preserveCamera === true;       // <-- Check preserve camera option
            const savedCamState  = preserveCamera ? { ..._camState } : null;  // <-- Save camera state if preserving
            
            _currentModel = makerModel;                                   // <-- Store current model
            
            const measure = M.measure.modelExtents(makerModel);            // <-- Measure model extents
            _modelBounds = measure;                                       // <-- Store model bounds
            
            const modelSVG = M.exporter.toSVG(makerModel, { useSvgPathOnly: true });  // <-- Export model to SVG
            
            let guidesHTML = '';                                          // <-- Initialize guides HTML
            
            if (_config.showGroundLine && guides.showGround !== false) {  // <-- Check if ground line should be shown
                guidesHTML += `<line x1="-20000" y1="0" x2="20000" y2="0" 
                    stroke="${_config.groundLineColor}" stroke-width="2" 
                    vector-effect="non-scaling-stroke" />`;                // <-- Add ground line
            }
            
            if (_config.showAxisLine && guides.showAxis !== false) {      // <-- Check if axis line should be shown
                const axisExtent = guides.axisHeight || 20000;           // <-- Get axis extent
                guidesHTML += `<line x1="0" y1="-${axisExtent}" x2="0" y2="${axisExtent}" 
                    stroke="${_config.axisLineColor}" stroke-width="2" 
                    stroke-dasharray="10,5" vector-effect="non-scaling-stroke" />`;  // <-- Add axis line
            }
            
            if (guides.custom && Array.isArray(guides.custom)) {          // <-- Check for custom guides
                for (const g of guides.custom) {                           // <-- Iterate custom guides
                    guidesHTML += g;                                      // <-- Add custom guide HTML
                }
            }
            
            const stroke   = guides.strokeColor || _config.strokeColor;   // <-- Get stroke color
            const strokeW = guides.strokeWidth || _config.strokeWidth;   // <-- Get stroke width
            const fill     = guides.fillColor || _config.fillColor;       // <-- Get fill color
            
            // SVG structure with Y-flip for CAD to screen coordinate conversion
            // flip-group inverts Y-axis (Maker.js Y+ UP -> SVG Y+ DOWN)
            // Unified camera system: camera-group applies scale+translate, flip-group applies Y-flip
            const svgHTML = `
            <svg id="cad-viewport-svg" width="100%" height="100%" style="display:block;">
                <g id="camera-group">
                    <g id="flip-group" transform="scale(1, -1)">
                        ${guidesHTML}
                        <g id="geometry-group" stroke="${stroke}" stroke-width="${strokeW}" fill="${fill}">
                            ${modelSVG}
                        </g>
                    </g>
                </g>
            </svg>`;
            
            _wrapperEl.innerHTML = svgHTML;                                // <-- Set SVG HTML
            
            _svgEl = document.getElementById('cad-viewport-svg');          // <-- Get SVG element
            setupInteraction(_svgEl);                                     // <-- Setup interaction handlers
            
            if (preserveCamera && savedCamState) {                        // <-- Check if preserving camera
                _camState = savedCamState;                                // <-- Restore camera state
            } else if (!_isInitialized) {                                 // <-- Check if first render
                _camState = { x: 0, y: 0, scale: 0.3 };                  // <-- Set temporary state
            }
            
            updateCameraTransform();                                      // <-- Apply camera transform
            
            // Call fitToView AFTER setting initialized flag
            if (!_isInitialized) {                                        // <-- Check if first render
                _isInitialized = true;                                    // <-- Set initialized flag
                fitToView();                                              // <-- Fit model to view
            } else {
                _isInitialized = true;                                    // <-- Set initialized flag
            }
            
            if (_onRenderCallback) {                                       // <-- Check if render callback exists
                _onRenderCallback(_currentModel, _modelBounds);           // <-- Call render callback
            }
            
            return true;                                                  // <-- Return success
        }
        // ------------------------------------------------------------


        // FUNCTION | Render Simple SVG (No Camera System)
        // ------------------------------------------------------------
        function renderSimple(makerModel, options = {}) {
            const M = getMakerJS();                                       // <-- Get Maker.js library
            if (!M || !_wrapperEl) return false;                         // <-- Exit if library or wrapper not found
            
            _currentModel = makerModel;                                   // <-- Store current model
            _modelBounds = M.measure.modelExtents(makerModel);           // <-- Measure and store model bounds
            
            const renderOptions = {                                       // <-- Create render options
                svgAttrs: options.svgAttrs || {},                         // <-- Get SVG attributes
                stroke: options.stroke || _config.strokeColor,            // <-- Get stroke color
                strokeWidth: options.strokeWidth || `${_config.strokeWidth}px`,  // <-- Get stroke width
                fill: options.fill || _config.fillColor                    // <-- Get fill color
            };
            
            const svg = M.exporter.toSVG(makerModel, renderOptions);      // <-- Export model to SVG
            _wrapperEl.innerHTML = svg;                                   // <-- Set SVG HTML
            
            return true;                                                  // <-- Return success
        }
        // ------------------------------------------------------------


        // FUNCTION | Get Current Model
        // ------------------------------------------------------------
        function getModel() {
            return _currentModel;                                         // <-- Return current model
        }
        // ------------------------------------------------------------


        // FUNCTION | Get Model Bounds
        // ------------------------------------------------------------
        function getBounds() {
            return _modelBounds;                                          // <-- Return model bounds
        }
        // ------------------------------------------------------------


        // FUNCTION | Set Render Callback
        // ------------------------------------------------------------
        function onRender(callback) {
            _onRenderCallback = callback;                                 // <-- Store render callback
        }
        // ------------------------------------------------------------


        // FUNCTION | Set Camera Change Callback
        // ------------------------------------------------------------
        function onCameraChange(callback) {
            _onCameraChangeCallback = callback;                           // <-- Store camera change callback
        }
        // ------------------------------------------------------------


        // FUNCTION | Get Viewport Configuration
        // ------------------------------------------------------------
        function getConfig() {
            return { ..._config };                                        // <-- Return copy of config
        }
        // ------------------------------------------------------------


        // FUNCTION | Set Viewport Configuration
        // ------------------------------------------------------------
        function setConfig(newConfig) {
            _config = { ..._config, ...newConfig };                       // <-- Merge new config
        }
        // ------------------------------------------------------------


        // FUNCTION | Check if Viewport is Initialized
        // ------------------------------------------------------------
        function isInitialized() {
            return _isInitialized;                                        // <-- Return initialization flag
        }
        // ------------------------------------------------------------


        // PUBLIC API | Export Functions to window.CadGenerator.Viewport
        // ------------------------------------------------------------
        window.CadGenerator = window.CadGenerator || {};                 // <-- Ensure namespace exists
        window.CadGenerator.Viewport = {                                  // <-- Attach public API
            init,
            render,
            renderSimple,
            getState,
            setState,
            getModel,
            getBounds,
            getConfig,
            setConfig,
            onRender,
            onCameraChange,                                               // <-- Camera change callback
            getMakerJS,
            isInitialized,
            fitToView
        };
        // ------------------------------------------------------------

        // endregion -------------------------------------------------------------------
    </script>

        // FUNCTION | Get scaled arrow size for dimension lines

        function getDimensionArrowSize() {

            // Arrow size = 2.5% of window height

        function getDimensionOffset() {

        // -----------------------------------------------------------------------------
        // Mullion Opening Width Management

        // FUNCTION | Initialize opening widths between mullions to even distribution
        // ------------------------------------------------------------
        function initMullionOpeningWidths() {
            const UI           = window.CadGenerator.DynamicUI;
            const windowWidth  = parseInt(UI.getValue('windowWidth'));
            const numMullions  = parseInt(UI.getValue('mullions'));
            const frameThick   = getFrameThickness();
            const mullionW     = getMullionWidth();
            
            const innerWidth        = windowWidth - (frameThick * 2);
            const numOpenings       = numMullions + 1;  // <-- Number of openings = mullions + 1
            const totalMullionWidth = numMullions * mullionW;  // <-- Total width of all mullions
            const availableWidth    = innerWidth - totalMullionWidth;
            const evenWidth         = availableWidth / numOpenings;
            
            frameworkOpeningWidths__BetweenMullions = Array(numOpenings).fill(evenWidth);
        }
        // ---------------------------------------------------------------

        // FUNCTION | Validate and normalize opening widths between mullions
        // ------------------------------------------------------------
        function normalizeMullionOpeningWidths() {
            const UI           = window.CadGenerator.DynamicUI;
            const windowWidth  = parseInt(UI.getValue('windowWidth'));
            const numMullions  = parseInt(UI.getValue('mullions'));
            const frameThick   = getFrameThickness();
            const mullionW     = getMullionWidth();
            
            const innerWidth        = windowWidth - (frameThick * 2);
            const numOpenings       = numMullions + 1;  // <-- Number of openings = mullions + 1
            const totalMullionWidth = numMullions * mullionW;  // <-- Total width of all mullions
            const availableWidth    = innerWidth - totalMullionWidth;
            
            // Ensure array length matches opening count
            if (frameworkOpeningWidths__BetweenMullions.length !== numOpenings) {
                initMullionOpeningWidths();
                return;
            }
            
            // Enforce minimum widths
            for (let i = 0; i < frameworkOpeningWidths__BetweenMullions.length; i++) {
                if (frameworkOpeningWidths__BetweenMullions[i] < MIN_OPENING_WIDTH) {
                    frameworkOpeningWidths__BetweenMullions[i] = MIN_OPENING_WIDTH;
                }
            }
            
            // Normalize to fit available width
            const currentTotal = frameworkOpeningWidths__BetweenMullions.reduce((a, b) => a + b, 0);
            if (Math.abs(currentTotal - availableWidth) > 0.1) {
                const scale = availableWidth / currentTotal;
                frameworkOpeningWidths__BetweenMullions = frameworkOpeningWidths__BetweenMullions.map(w => w * scale);
            }
        }

        // -----------------------------------------------------------------------------
