        // FUNCTION | Generate complete window model
        // ------------------------------------------------------------
        function generateWindow(M) {
            const UI = window.CadGenerator.DynamicUI;

            // Get parameters
            const windowWidth  = parseInt(UI.getValue('windowWidth'));
            const windowHeight = parseInt(UI.getValue('windowHeight'));
            const numMullions  = parseInt(UI.getValue('mullions'));
            const numOpenings  = numMullions + 1;  // <-- Number of openings = mullions + 1
            const hGlazeBars   = parseInt(UI.getValue('hGlazeBars'));
            const vGlazeBars   = parseInt(UI.getValue('vGlazeBars'));
            const frameThick   = getFrameThickness();
            const showCill     = getShowCill();

            // Model container
            const windowModel = { 
                models: {},
                paths: {},
                units: M.unitType.Millimeter 
            };

            // 1. Create outer frame (if thickness > 0)
            if (frameThick > 0) {
                windowModel.models.frameworkOuterWindowFrame = createFrameworkOuterWindowFrame(M, windowWidth, windowHeight, frameThick);
            } else {
                // Just outer rectangle when no frame
                windowModel.models.outerRect = {
                    models: { rect: new M.models.Rectangle(windowWidth, windowHeight) }
                };
            }

            // 2. Create openings separated by mullions
            const openingModels = createFrameworkOpenings__BetweenMullions(M, windowWidth, windowHeight, numOpenings, numMullions, frameThick);
            Object.assign(windowModel.models, openingModels);

            // 2.5. Add casements to openings if enabled
            if (getShowCasements()) {
                const casementInset = getCasementInset();
                createFrameworkCasements__WithinAllOpenings(M, windowModel, windowHeight, casementInset, frameThick);
            }

            // 3. Add glaze bars to each opening
            createFrameworkGlazeBars__WithinOpenings(M, windowModel, windowHeight, hGlazeBars, vGlazeBars, frameThick);

            // 3.5. Add lead lines to glass panes if enabled
            if (getShowLeadLines()) {
                createLeadLines__WithinAllOpenings(M, windowModel, windowHeight, frameThick, hGlazeBars, vGlazeBars);
            }

            // 4. Add window cill if enabled
            if (showCill) {
                windowModel.models.cill = createWindowCill(M, windowWidth, windowHeight);
            }

            // 5. Create dimension annotations (if enabled)
            if (getShowDimensions()) {
                createDimensions(M, windowModel, windowWidth, windowHeight, numOpenings, numMullions, frameThick, showCill);
            }

            return windowModel;
        }
        // ---------------------------------------------------------------

        // HELPER FUNCTION | Assign Default Layer to Unlayered Geometry
        // ------------------------------------------------------------
        // Recursively assigns LAYER_DEFAULT to models without explicit layers
        // Respects parent layer inheritance - children inherit parent's layer
        // ------------------------------------------------------------
        function assignDefaultLayerToModel(model, parentLayer = null) {
            // Determine this model's effective layer
            // If model has its own layer, use it; otherwise inherit from parent
            const effectiveLayer = model.layer || parentLayer;
            
            // Only assign default layer if no layer is set AND no parent layer to inherit
            if (!model.layer && !parentLayer) {
                model.layer = LAYER_DEFAULT;
            }
            
            // Recursively process nested models, passing down the effective layer
            if (model.models) {
                for (const key in model.models) {
                    if (model.models.hasOwnProperty(key)) {
                        assignDefaultLayerToModel(model.models[key], effectiveLayer);
                    }
                }
            }
        }
        // ---------------------------------------------------------------

        // FUNCTION | Download DXF file
        // ------------------------------------------------------------
        function downloadDXF() {
            const Viewport = window.CadGenerator.Viewport;
            const M        = Viewport.getMakerJS();
            
            if (!M) {
                alert('Error: CAD library not loaded. Cannot export DXF.');
                return;
            }
            
            // Force regenerate model from current UI values before export
            normalizeMullionOpeningWidths();
            const exportModel = generateWindow(M);
            
            // Assign default layer to any geometry without explicit layer assignment
            assignDefaultLayerToModel(exportModel);
            
            const DxfExport = window.CadGenerator.DxfExport;
            DxfExport.download(exportModel, 'Window', {
                layerOptions: {
                    [LAYER_DEFAULT]:    { color: 7 },                            // <-- White (AutoCAD color code 7)
                    [LAYER_CASEMENTS]:  { color: 3 },                            // <-- Green (AutoCAD color code 3)
                    [LAYER_LEADLINES]:  { color: 8 },                            // <-- Gray (AutoCAD color code 8)
                    [LAYER_GLAZEBARS]:  { color: 4 },                            // <-- Cyan (AutoCAD color code 4)
                    [LAYER_DIMENSIONS]: { color: 1 }                             // <-- Red (AutoCAD color code 1)
                }
            });
        }
        // ---------------------------------------------------------------

        // -----------------------------------------------------------------------------
        // Frame Generation
        // -----------------------------------------------------------------------------

        // FUNCTION | Create outer window frame (double rectangle)
        // ------------------------------------------------------------
        function createFrameworkOuterWindowFrame(M, width, height, frameThick) {
            return {
                models: {
                    outer: new M.models.Rectangle(width, height),
                    inner: {
                        models: {
                            rect: new M.models.Rectangle(
                                width - (frameThick * 2),
                                height - (frameThick * 2)
                            )
                        },
                        origin: [frameThick, frameThick]
                    }
                }
            };
        }
        // ---------------------------------------------------------------

        // FUNCTION | Create window cill (at bottom of window in CAD space)
        // CAD space: Y=0 is window bottom, negative Y is below window
        // After Y-flip: negative Y appears at bottom of screen
        // ------------------------------------------------------------
        function createWindowCill(M, windowWidth, windowHeight) {
            const cillWidth = windowWidth + (CILL_HORN_OVERHANG * 2);
            const cillX     = -CILL_HORN_OVERHANG;
            const cillY     = -CILL_HEIGHT;  // <-- Below window (negative Y in CAD)

            return {
                models: {
                    rect: new M.models.Rectangle(cillWidth, CILL_HEIGHT)
                },
                origin: [cillX, cillY]
            };
        }
        // ---------------------------------------------------------------

        // -----------------------------------------------------------------------------
        // Pane/Opening Generation
        // -----------------------------------------------------------------------------

        // FUNCTION | Create window panes/openings separated by mullions
        // ------------------------------------------------------------
        function createFrameworkOpenings__BetweenMullions(M, width, height, numOpenings, numMullions, frameThick) {
            const openings    = {};
            const innerHeight = height - (frameThick * 2);
            const mullionW    = getMullionWidth();
            
            let xOffset = frameThick;

            for (let i = 0; i < numOpenings; i++) {
                const openingWidth = frameworkOpeningWidths__BetweenMullions[i];
                
                // Create opening frame
                openings[`opening_${i}`] = {
                    models: {
                        frame: new M.models.Rectangle(openingWidth, innerHeight)
                    },
                    origin: [xOffset, frameThick]
                };

                // Store opening data for drag handles
                openings[`opening_${i}`]._data = {
                    index: i,
                    x: xOffset,
                    width: openingWidth
                };

                xOffset += openingWidth;

                // Add mullion (except after last opening)
                if (i < numOpenings - 1) {
                    openings[`mullion_${i}`] = {
                        models: {
                            rect: new M.models.Rectangle(mullionW, innerHeight)
                        },
                        origin: [xOffset, frameThick],
                        _data: {
                            index: i,
                            x: xOffset
                        }
                    };
                    xOffset += mullionW;
                }
            }

            return openings;
        }
        // ---------------------------------------------------------------

        // -----------------------------------------------------------------------------
        // Casement Frame Generation
        // -----------------------------------------------------------------------------

        // FUNCTION | Create casement frames within all openings
        // ------------------------------------------------------------
        function createFrameworkCasements__WithinAllOpenings(M, windowModel, windowHeight, casementInset, frameThick) {
            const innerHeight = windowHeight - (frameThick * 2);                 // <-- Opening height
            
            // Iterate through all openings and add casements
            for (let i = 0; i < frameworkOpeningWidths__BetweenMullions.length; i++) {
                const openingKey   = `opening_${i}`;
                const opening      = windowModel.models[openingKey];
                
                if (!opening) continue;
                
                const openingWidth = frameworkOpeningWidths__BetweenMullions[i];
                
                // Create casement frame for this opening
                opening.models.casement = createFrameworkCasement__SingleOpening(
                    M, 
                    openingWidth, 
                    innerHeight, 
                    casementInset
                );
            }
        }
        // ---------------------------------------------------------------

        // FUNCTION | Create single casement frame within one opening
        // ------------------------------------------------------------
        function createFrameworkCasement__SingleOpening(M, openingWidth, openingHeight, casementInset) {
            // Calculate inset dimensions (casement sits inside opening by inset amount)
            const casementWidth  = openingWidth - (casementInset * 2);           // <-- Inset from both sides
            const casementHeight = openingHeight - (casementInset * 2);          // <-- Inset from top and bottom
            
            return {
                models: {
                    rect: new M.models.Rectangle(casementWidth, casementHeight)
                },
                origin: [casementInset, casementInset],                          // <-- Position at inset offset
                layer: LAYER_CASEMENTS                                            // <-- Layer for thinner stroke
            };
        }
        // ---------------------------------------------------------------

        // -----------------------------------------------------------------------------
        // Glaze Bar Generation
        // -----------------------------------------------------------------------------

        // FUNCTION | Create glaze bars within all panes/openings
        // ------------------------------------------------------------
        function createFrameworkGlazeBars__WithinOpenings(M, windowModel, windowHeight, hBars, vBars, frameThick) {
            const innerHeight   = windowHeight - (frameThick * 2);
            const glazeBarWidth = getGlazeBarWidth();
            
            // Get casement inset (0 if casements disabled)
            const casementInset = getShowCasements() ? getCasementInset() : 0;   // <-- Casement adjustment

            for (let i = 0; i < frameworkOpeningWidths__BetweenMullions.length; i++) {
                const openingKey = `opening_${i}`;
                const opening    = windowModel.models[openingKey];
                
                if (!opening) continue;

                const openingWidth = frameworkOpeningWidths__BetweenMullions[i];
                
                // Calculate adjusted dimensions (shorter by casement insets on both ends)
                const adjustedOpeningWidth  = openingWidth - (casementInset * 2);    // <-- Shorter width
                const adjustedInnerHeight   = innerHeight - (casementInset * 2);     // <-- Shorter height

                // Add horizontal glaze bars
                if (hBars > 0) {
                    const hSpacing = adjustedInnerHeight / (hBars + 1);
                    for (let h = 0; h < hBars; h++) {
                        const yPos = (hSpacing * (h + 1)) + casementInset;          // <-- Offset by casement
                        opening.models[`hBar_${h}`] = {
                            models: {
                                rect: new M.models.Rectangle(adjustedOpeningWidth, glazeBarWidth)
                            },
                            origin: [casementInset, yPos - (glazeBarWidth / 2)],    // <-- Offset by casement
                            layer: LAYER_GLAZEBARS                                   // <-- Glaze bars layer
                        };
                    }
                }

                // Add vertical glaze bars
                if (vBars > 0) {
                    const vSpacing = adjustedOpeningWidth / (vBars + 1);
                    for (let v = 0; v < vBars; v++) {
                        const xPos = (vSpacing * (v + 1)) + casementInset;          // <-- Offset by casement
                        opening.models[`vBar_${v}`] = {
                            models: {
                                rect: new M.models.Rectangle(glazeBarWidth, adjustedInnerHeight)
                            },
                            origin: [xPos - (glazeBarWidth / 2), casementInset],   // <-- Offset by casement
                            layer: LAYER_GLAZEBARS                                   // <-- Glaze bars layer
                        };
                    }
                }
            }
        }
        // ---------------------------------------------------------------

        // -----------------------------------------------------------------------------
        // Lead Lines Generation
        // -----------------------------------------------------------------------------

        // FUNCTION | Create lead lines within all openings
        // ------------------------------------------------------------
        // Adds decorative lead line patterns over glass panes
        // Accounts for casement insets and glaze bar positions
        // ------------------------------------------------------------
        function createLeadLines__WithinAllOpenings(M, windowModel, windowHeight, frameThick, hGlazeBars, vGlazeBars) {
            const innerHeight      = windowHeight - (frameThick * 2);             // <-- Opening height
            const casementInset    = getShowCasements() ? getCasementInset() : 0; // <-- Casement adjustment
            const glazeBarWidth    = getGlazeBarWidth();                          // <-- Glaze bar thickness
            const leadVDivisions   = getLeadLinesVDivisions();                    // <-- Vertical lead divisions
            const leadHDivisions   = getLeadLinesHDivisions();                    // <-- Horizontal lead divisions
            const leadThickness    = getLeadLinesThickness();                     // <-- Lead line thickness

            // Skip if no divisions requested
            if (leadVDivisions === 0 && leadHDivisions === 0) return;

            for (let i = 0; i < frameworkOpeningWidths__BetweenMullions.length; i++) {
                const openingKey = `opening_${i}`;
                const opening    = windowModel.models[openingKey];
                
                if (!opening) continue;

                const openingWidth = frameworkOpeningWidths__BetweenMullions[i];
                
                // Calculate adjusted dimensions (shorter by casement insets on both ends)
                const adjustedOpeningWidth = openingWidth - (casementInset * 2);  // <-- Shorter width
                const adjustedInnerHeight  = innerHeight - (casementInset * 2);   // <-- Shorter height

                // Calculate glass pane grid (number of panes = glaze bars + 1)
                const numPaneCols = vGlazeBars + 1;                               // <-- Columns of glass
                const numPaneRows = hGlazeBars + 1;                               // <-- Rows of glass

                // Create lead lines model container for this opening
                opening.models.leadLines = {
                    paths: {},
                    layer: LAYER_LEADLINES                                        // <-- Layer for thin stroke
                };

                // Generate lead lines for each glass pane
                for (let row = 0; row < numPaneRows; row++) {
                    for (let col = 0; col < numPaneCols; col++) {
                        // Calculate pane boundaries
                        const paneInfo = calculatePaneBoundaries(
                            adjustedOpeningWidth, 
                            adjustedInnerHeight, 
                            numPaneCols, 
                            numPaneRows, 
                            col, 
                            row, 
                            glazeBarWidth, 
                            casementInset
                        );

                        // Draw lead lines based on thickness mode
                        if (leadThickness === 0) {
                            // Centerline mode - draw single lines
                            createLeadLinesCenterlines__SinglePane(
                                M, 
                                opening.models.leadLines, 
                                paneInfo, 
                                leadVDivisions, 
                                leadHDivisions, 
                                row, 
                                col
                            );
                        } else {
                            // Offset mode - draw paired lines
                            createLeadLinesOffset__SinglePane(
                                M, 
                                opening.models.leadLines, 
                                paneInfo, 
                                leadVDivisions, 
                                leadHDivisions, 
                                leadThickness, 
                                row, 
                                col
                            );
                        }
                    }
                }
            }
        }
        // ---------------------------------------------------------------

        // HELPER FUNCTION | Calculate pane boundaries within opening
        // ------------------------------------------------------------
        function calculatePaneBoundaries(openingWidth, openingHeight, numCols, numRows, col, row, glazeBarWidth, casementInset) {
            // Calculate pane dimensions (excluding glaze bars)
            const totalHBarSpace = (numRows - 1) * glazeBarWidth;                 // <-- Total space taken by h-bars
            const totalVBarSpace = (numCols - 1) * glazeBarWidth;                 // <-- Total space taken by v-bars
            const paneWidth      = (openingWidth - totalVBarSpace) / numCols;     // <-- Width of each pane
            const paneHeight     = (openingHeight - totalHBarSpace) / numRows;    // <-- Height of each pane

            // Calculate pane position (origin at bottom-left of pane)
            const paneX = casementInset + (col * (paneWidth + glazeBarWidth));    // <-- X position of pane
            const paneY = casementInset + (row * (paneHeight + glazeBarWidth));   // <-- Y position of pane

            return {
                x:      paneX,
                y:      paneY,
                width:  paneWidth,
                height: paneHeight
            };
        }
        // ---------------------------------------------------------------

        // FUNCTION | Create lead lines as centerlines (thickness = 0)
        // ------------------------------------------------------------
        function createLeadLinesCenterlines__SinglePane(M, leadLinesModel, paneInfo, vDivisions, hDivisions, row, col) {
            const { x, y, width, height } = paneInfo;

            // Draw vertical lead lines (divisions within pane)
            if (vDivisions > 0) {
                const vSpacing = width / (vDivisions + 1);                        // <-- Spacing between vertical lines
                for (let v = 0; v < vDivisions; v++) {
                    const lineX = x + (vSpacing * (v + 1));                        // <-- X position of line
                    const lineKey = `vLead_r${row}_c${col}_${v}`;                  // <-- Unique key
                    leadLinesModel.paths[lineKey] = new M.paths.Line(
                        [lineX, y],                                               // <-- Start point (bottom)
                        [lineX, y + height]                                       // <-- End point (top)
                    );
                }
            }

            // Draw horizontal lead lines (divisions within pane)
            if (hDivisions > 0) {
                const hSpacing = height / (hDivisions + 1);                        // <-- Spacing between horizontal lines
                for (let h = 0; h < hDivisions; h++) {
                    const lineY = y + (hSpacing * (h + 1));                        // <-- Y position of line
                    const lineKey = `hLead_r${row}_c${col}_${h}`;                  // <-- Unique key
                    leadLinesModel.paths[lineKey] = new M.paths.Line(
                        [x, lineY],                                               // <-- Start point (left)
                        [x + width, lineY]                                        // <-- End point (right)
                    );
                }
            }
        }
        // ---------------------------------------------------------------

        // FUNCTION | Create lead lines as offset pairs (thickness > 0)
        // ------------------------------------------------------------
        function createLeadLinesOffset__SinglePane(M, leadLinesModel, paneInfo, vDivisions, hDivisions, thickness, row, col) {
            const { x, y, width, height } = paneInfo;
            const halfThick = thickness / 2;                                      // <-- Half thickness for offset

            // Draw vertical lead line pairs (offset from centerline)
            if (vDivisions > 0) {
                const vSpacing = width / (vDivisions + 1);                        // <-- Spacing between vertical lines
                for (let v = 0; v < vDivisions; v++) {
                    const centerX = x + (vSpacing * (v + 1));                     // <-- Center X position
                    const leftX   = centerX - halfThick;                          // <-- Left line X
                    const rightX  = centerX + halfThick;                          // <-- Right line X
                    
                    // Left line of pair
                    leadLinesModel.paths[`vLeadL_r${row}_c${col}_${v}`] = new M.paths.Line(
                        [leftX, y],
                        [leftX, y + height]
                    );
                    // Right line of pair
                    leadLinesModel.paths[`vLeadR_r${row}_c${col}_${v}`] = new M.paths.Line(
                        [rightX, y],
                        [rightX, y + height]
                    );
                }
            }

            // Draw horizontal lead line pairs (offset from centerline)
            if (hDivisions > 0) {
                const hSpacing = height / (hDivisions + 1);                        // <-- Spacing between horizontal lines
                for (let h = 0; h < hDivisions; h++) {
                    const centerY = y + (hSpacing * (h + 1));                     // <-- Center Y position
                    const bottomY = centerY - halfThick;                          // <-- Bottom line Y
                    const topY    = centerY + halfThick;                          // <-- Top line Y
                    
                    // Bottom line of pair
                    leadLinesModel.paths[`hLeadB_r${row}_c${col}_${h}`] = new M.paths.Line(
                        [x, bottomY],
                        [x + width, bottomY]
                    );
                    // Top line of pair
                    leadLinesModel.paths[`hLeadT_r${row}_c${col}_${h}`] = new M.paths.Line(
                        [x, topY],
                        [x + width, topY]
                    );
                }
            }
        }
        // ---------------------------------------------------------------

        // -----------------------------------------------------------------------------
        // Dimension Annotations (Layer: 95_05__WindowGen__Dimensions)
        // -----------------------------------------------------------------------------

        // FUNCTION | Create all dimension annotations (CAD space with Y-flip)
        // ------------------------------------------------------------
        // In CAD space: Y=0 is window bottom, Y=height is window top
        // Cill is at negative Y (below window)
        // After Y-flip: high CAD Y appears at top of screen, low CAD Y at bottom
        // ------------------------------------------------------------
        function createDimensions(M, windowModel, width, height, numOpenings, numMullions, frameThick, showCill) {
            const dimOffset = getDimensionOffset();  // <-- Scaled offset
            const cillOffset = showCill ? CILL_HEIGHT + 20 : 0;

            // Overall width dimension (above window - high Y in CAD = top of screen after flip)
            windowModel.models.dimOverallWidth = createHorizontalDimension(M, 
                [0, height + dimOffset], 
                [width, height + dimOffset],
                `${width}`
            );

            // Overall height dimension (right side)
            windowModel.models.dimOverallHeight = createVerticalDimension(M, 
                [width + dimOffset, 0], 
                [width + dimOffset, height],
                `${height}`
            );

            // Opening width dimensions (below window/cill - negative Y in CAD = bottom of screen)
            const dimY = -(cillOffset + dimOffset);
            let xOffset = frameThick;
            const mullionW = getMullionWidth();

            for (let i = 0; i < numOpenings; i++) {
                const openingWidth = Math.round(frameworkOpeningWidths__BetweenMullions[i]);
                
                windowModel.models[`dimOpening_${i}`] = createHorizontalDimension(M,
                    [xOffset, dimY],
                    [xOffset + frameworkOpeningWidths__BetweenMullions[i], dimY],
                    `${openingWidth}`
                );

                xOffset += frameworkOpeningWidths__BetweenMullions[i];
                if (i < numOpenings - 1) {
                    xOffset += mullionW;
                }
            }

            // Cill dimensions if shown (below cill - more negative Y)
            if (showCill) {
                const cillWidth = width + (CILL_HORN_OVERHANG * 2);
                const cillDimY = -(CILL_HEIGHT + dimOffset * 0.4);  // <-- Scaled spacing
                windowModel.models.dimCillWidth = createHorizontalDimension(M,
                    [-CILL_HORN_OVERHANG, cillDimY],
                    [width + CILL_HORN_OVERHANG, cillDimY],
                    `${cillWidth}`
                );
            }
        }
        // ---------------------------------------------------------------

        // FUNCTION | Create horizontal dimension line with text geometry
        // ------------------------------------------------------------
        function createHorizontalDimension(M, start, end, text) {
            const y = start[1];
            const midX = (start[0] + end[0]) / 2;
            const witnessLength = getWitnessLength();  // <-- Scaled witness line length
            const arrowSize = getDimensionArrowSize();  // <-- Scaled arrow size

            const dimModel = {
                paths: {
                    line: new M.paths.Line(start, end),
                    witnessStart: new M.paths.Line(
                        [start[0], y - witnessLength],
                        [start[0], y + witnessLength]
                    ),
                    witnessEnd: new M.paths.Line(
                        [end[0], y - witnessLength],
                        [end[0], y + witnessLength]
                    ),
                    arrowL1: new M.paths.Line(start, [start[0] + arrowSize, y + arrowSize / 2.5]),
                    arrowL2: new M.paths.Line(start, [start[0] + arrowSize, y - arrowSize / 2.5]),
                    arrowR1: new M.paths.Line(end, [end[0] - arrowSize, y + arrowSize / 2.5]),
                    arrowR2: new M.paths.Line(end, [end[0] - arrowSize, y - arrowSize / 2.5])
                },
                models: {},
                layer: LAYER_DIMENSIONS
            };

            // Add text geometry if font is loaded and text is provided
            if (_cadFont && text) {
                console.log(`Creating horizontal dim text: "${text}"`);
                
                // CRITICAL: Verify Bezier is available (required by Maker.js Text)
                if (typeof Bezier === 'undefined') {
                    console.error('❌ CRITICAL: Bezier.js not available! Text creation will fail.');
                    console.error('Maker.js Text model requires Bezier.js to be loaded globally.');
                    return dimModel;
                }
                
                try {
                    const fontSize = DIM_TEXT_SIZE_MM;
                    console.log('Font size:', fontSize, 'Font:', _cadFont);
                    console.log('Bezier global available:', typeof Bezier !== 'undefined');
                    const textModel = new M.models.Text(_cadFont, text, fontSize);
                    console.log('Text model created:', textModel);
                    
                    // Get text bounds and center it at dimension line midpoint
                    const textBounds = M.measure.modelExtents(textModel);
                    const textWidth = textBounds.high[0] - textBounds.low[0];
                    const textHeight = textBounds.high[1] - textBounds.low[1];
                    
                    // Position text centered above the dimension line
                    M.model.move(textModel, [midX - textWidth / 2, y + textHeight * 0.3]);
                    
                    dimModel.models.dimText = textModel;
                    console.log('✓ Text successfully added to dimModel');
                } catch (error) {
                    console.error('❌ Text creation error:', error);
                    console.error('Error details:', error.message, error.stack);
                }
            } else {
                console.warn('⚠ Skipping text - Font:', !!_cadFont, 'Text:', text);
            }

            return dimModel;
        }
        // ---------------------------------------------------------------

        // FUNCTION | Create vertical dimension line with text geometry
        // ------------------------------------------------------------
        function createVerticalDimension(M, start, end, text) {
            const x = start[0];
            const midY = (start[1] + end[1]) / 2;
            const witnessLength = getWitnessLength();  // <-- Scaled witness line length
            const arrowSize = getDimensionArrowSize();  // <-- Scaled arrow size

            const dimModel = {
                paths: {
                    line: new M.paths.Line(start, end),
                    witnessStart: new M.paths.Line(
                        [x - witnessLength, start[1]],
                        [x + witnessLength, start[1]]
                    ),
                    witnessEnd: new M.paths.Line(
                        [x - witnessLength, end[1]],
                        [x + witnessLength, end[1]]
                    ),
                    arrowB1: new M.paths.Line(start, [x + arrowSize / 2.5, start[1] + arrowSize]),
                    arrowB2: new M.paths.Line(start, [x - arrowSize / 2.5, start[1] + arrowSize]),
                    arrowT1: new M.paths.Line(end, [x + arrowSize / 2.5, end[1] - arrowSize]),
                    arrowT2: new M.paths.Line(end, [x - arrowSize / 2.5, end[1] - arrowSize])
                },
                models: {},
                layer: LAYER_DIMENSIONS
            };

            // Add text geometry if font is loaded and text is provided
            if (_cadFont && text) {
                console.log(`Creating vertical dim text: "${text}"`);
                
                // CRITICAL: Verify Bezier is available (required by Maker.js Text)
                if (typeof Bezier === 'undefined') {
                    console.error('❌ CRITICAL: Bezier.js not available! Text creation will fail.');
                    console.error('Maker.js Text model requires Bezier.js to be loaded globally.');
                    return dimModel;
                }
                
                try {
                    const fontSize = DIM_TEXT_SIZE_MM;
                    console.log('Font size:', fontSize, 'Font:', _cadFont);
                    console.log('Bezier global available:', typeof Bezier !== 'undefined');
                    const textModel = new M.models.Text(_cadFont, text, fontSize);
                    console.log('Text model created:', textModel);
                    
                    // Get text bounds
                    const textBounds = M.measure.modelExtents(textModel);
                    const textWidth = textBounds.high[0] - textBounds.low[0];
                    const textHeight = textBounds.high[1] - textBounds.low[1];
                    
                    // Rotate text 90 degrees for vertical dimensions
                    M.model.rotate(textModel, 90, [0, 0]);
                    
                    // Position text centered beside the dimension line
                    // After rotation, text extends vertically, so adjust positioning accordingly
                    // Offset by textHeight * 1.5 to give clearance from the dimension line
                    M.model.move(textModel, [x + textHeight * 1.5, midY - textWidth / 2]);
                    
                    dimModel.models.dimText = textModel;
                    console.log('✓ Text successfully added to dimModel');
                } catch (error) {
                    console.error('❌ Text creation error:', error);
                    console.error('Error details:', error.message, error.stack);
                }
            } else {
                console.warn('⚠ Skipping text - Font:', !!_cadFont, 'Text:', text);
            }

            return dimModel;
        }

        // FUNCTION | Apply layer-specific styling to SVG paths
        // ------------------------------------------------------------
        // Dimension lines need to be red but Viewport applies uniform stroke.
        // Casement lines need to be thinner than standard frames.
        // This post-processes the SVG to apply layer-specific colors and stroke widths.
        // ------------------------------------------------------------
        function applyLayerStyles() {
            const svg = document.getElementById('cad-viewport-svg');
            if (!svg) return;
            
            const geometryGroup = svg.querySelector('#geometry-group');
            if (!geometryGroup) return;
            
            // MakerJS exports paths with layer info in path IDs or parent group IDs
            // Find all paths and apply dimension color to dimension layer elements
            const allPaths = geometryGroup.querySelectorAll('path');
            allPaths.forEach(path => {
                const pathId = path.getAttribute('id') || '';
                const parentId = path.parentElement?.getAttribute('id') || '';
                
                // Check if path belongs to dimension layer or has dimension-related naming
                if (pathId.includes(LAYER_DIMENSIONS) || 
                    parentId.includes(LAYER_DIMENSIONS) ||
                    pathId.includes('dimOverall') || 
                    pathId.includes('dimOpening') || 
                    pathId.includes('dimCill')) {
                    path.setAttribute('stroke', COLOR_DIMENSION);                // <-- Dimension color
                }
                
                // Check if path belongs to casements layer (thinner stroke)
                if (pathId.includes(LAYER_CASEMENTS) || 
                    parentId.includes(LAYER_CASEMENTS) ||
                    pathId.includes('casement')) {
                    path.setAttribute('stroke-width', STROKE_WIDTH_CASEMENT);   // <-- Thinner stroke
                }
                
                // Check if path belongs to leadLines layer (thinnest stroke)
                if (pathId.includes(LAYER_LEADLINES) || 
                    parentId.includes(LAYER_LEADLINES) ||
                    pathId.includes('Lead')) {
                    path.setAttribute('stroke-width', STROKE_WIDTH_LEADLINES);  // <-- Thinnest stroke
                }
            });
            
            // Also check for groups that may contain dimension, casement, or lead line paths
            const allGroups = geometryGroup.querySelectorAll('g');
            allGroups.forEach(group => {
                const groupId = group.getAttribute('id') || '';
                
                // Apply dimension color to dimension groups
                if (groupId.includes(LAYER_DIMENSIONS) || 
                    groupId.includes('dimOverall') || 
                    groupId.includes('dimOpening') || 
                    groupId.includes('dimCill')) {
                    const childPaths = group.querySelectorAll('path');
                    childPaths.forEach(path => {
                        path.setAttribute('stroke', COLOR_DIMENSION);            // <-- Dimension color
                    });
                }
                
                // Apply thinner stroke to casement groups
                if (groupId.includes(LAYER_CASEMENTS) || groupId.includes('casement')) {
                    const childPaths = group.querySelectorAll('path');
                    childPaths.forEach(path => {
                        path.setAttribute('stroke-width', STROKE_WIDTH_CASEMENT); // <-- Thinner stroke
                    });
                }
                
                // Apply thinnest stroke to lead line groups
                if (groupId.includes(LAYER_LEADLINES) || groupId.includes('Lead')) {
                    const childPaths = group.querySelectorAll('path');
                    childPaths.forEach(path => {
                        path.setAttribute('stroke-width', STROKE_WIDTH_LEADLINES); // <-- Thinnest stroke
                    });
                }
            });
        }

        // FUNCTION | Build secondary controls with toggles
        // ------------------------------------------------------------
        function buildSecondaryControls() {
            const container = document.getElementById(SECONDARY_CONFIG.containerId);
            if (!container) return;

            container.innerHTML = '';

            // Build slider inputs section
            const slidersSection = document.createElement('div');
            slidersSection.className = 'controls-section';
            
            const slidersTitle = document.createElement('div');
            slidersTitle.className = 'controls-section-title';
            slidersTitle.textContent = 'Frame Dimensions';
            slidersSection.appendChild(slidersTitle);

            const slidersRow = document.createElement('div');
            slidersRow.style.display = 'flex';
            slidersRow.style.gap = '15px';

            for (const input of SECONDARY_CONFIG.inputs) {
                const group = createSliderGroup(input);
                slidersRow.appendChild(group);
            }
            slidersSection.appendChild(slidersRow);
            container.appendChild(slidersSection);

            // Build toggles section
            const togglesSection = document.createElement('div');
            togglesSection.className = 'controls-section';
            
            const togglesTitle = document.createElement('div');
            togglesTitle.className = 'controls-section-title';
            togglesTitle.textContent = 'Options';
            togglesSection.appendChild(togglesTitle);

            for (const toggle of SECONDARY_CONFIG.toggles) {
                const toggleGroup = createToggleGroup(toggle);
                togglesSection.appendChild(toggleGroup);
            }
            container.appendChild(togglesSection);

            // Build casements section
            if (SECONDARY_CONFIG.casements) {
                const casementsSection = document.createElement('div');
                casementsSection.className = 'controls-section';
                
                const casementsTitle = document.createElement('div');
                casementsTitle.className = 'controls-section-title';
                casementsTitle.textContent = 'Casements';
                casementsSection.appendChild(casementsTitle);

                let casementsToggleCheckbox = null;

                for (const item of SECONDARY_CONFIG.casements) {
                    // First item is toggle, rest are sliders
                    if (item.id === 'showCasements') {
                        const toggleGroup = createToggleGroup(item);
                        casementsSection.appendChild(toggleGroup);
                        // Store reference to checkbox for later use
                        casementsToggleCheckbox = document.getElementById(item.id);
                    } else {
                        const sliderGroup = createSliderGroup(item);
                        // Conditionally enable slider based on toggle
                        if (item.enabledBy) {
                            const slider = sliderGroup.querySelector('input[type="range"]');
                            const valueDisplay = sliderGroup.querySelector('.cad-value-display');
                            
                            // Set initial disabled state immediately (assuming toggle is off by default)
                            if (slider && valueDisplay) {
                                slider.disabled = true;
                                sliderGroup.style.opacity = '0.4';
                                sliderGroup.style.pointerEvents = 'none';
                                valueDisplay.style.cursor = 'not-allowed';
                            }
                            
                            const updateSliderState = () => {
                                const enablerCheckbox = casementsToggleCheckbox || document.getElementById(item.enabledBy);
                                if (slider && valueDisplay) {
                                    if (enablerCheckbox && enablerCheckbox.checked) {
                                        slider.disabled = false;
                                        sliderGroup.style.opacity = '1';
                                        sliderGroup.style.pointerEvents = 'auto';
                                        valueDisplay.style.cursor = 'pointer';
                                    } else {
                                        slider.disabled = true;
                                        sliderGroup.style.opacity = '0.4';
                                        sliderGroup.style.pointerEvents = 'none';
                                        valueDisplay.style.cursor = 'not-allowed';
                                    }
                                }
                            };
                            
                            // Update initial state after DOM is ready (in case toggle default is true)
                            requestAnimationFrame(() => {
                                updateSliderState();
                            });
                            
                            // Update when toggle changes
                            if (casementsToggleCheckbox) {
                                casementsToggleCheckbox.addEventListener('change', updateSliderState);
                            } else {
                                // Fallback: try to find checkbox after DOM is ready
                                setTimeout(() => {
                                    const checkbox = document.getElementById(item.enabledBy);
                                    if (checkbox) {
                                        checkbox.addEventListener('change', updateSliderState);
                                        updateSliderState();
                                    }
                                }, 0);
                            }
                        }
                        casementsSection.appendChild(sliderGroup);
                    }
                }
                container.appendChild(casementsSection);
            }

            // Build lead lines section (two-column compact layout)
            if (SECONDARY_CONFIG.leadLines) {
                const leadLinesSection = document.createElement('div');
                leadLinesSection.className = 'controls-section';
                
                const leadLinesTitle = document.createElement('div');
                leadLinesTitle.className = 'controls-section-title';
                leadLinesTitle.textContent = 'Lead Lines';
                leadLinesSection.appendChild(leadLinesTitle);

                // Create two-column layout container
                const columnsContainer = document.createElement('div');
                columnsContainer.style.display = 'flex';
                columnsContainer.style.gap = '15px';

                // Left column: Toggle + Thickness
                const leftColumn = document.createElement('div');
                leftColumn.style.display = 'flex';
                leftColumn.style.flexDirection = 'column';
                leftColumn.style.gap = '8px';

                // Right column: V Divisions + H Divisions
                const rightColumn = document.createElement('div');
                rightColumn.style.display = 'flex';
                rightColumn.style.flexDirection = 'column';
                rightColumn.style.gap = '8px';

                const sliderUpdateFunctions = [];                                 // <-- Store update functions

                for (const item of SECONDARY_CONFIG.leadLines) {
                    if (item.id === 'showLeadLines') {
                        // Toggle goes in left column
                        const toggleGroup = createToggleGroup(item);
                        leftColumn.appendChild(toggleGroup);
                    } else if (item.id === 'leadLinesThickness') {
                        // Thickness slider goes in left column
                        const sliderGroup = createSliderGroup(item);
                        sliderGroup.style.minWidth = '80px';
                        setupLeadLineSliderState(sliderGroup, item, sliderUpdateFunctions);
                        leftColumn.appendChild(sliderGroup);
                    } else {
                        // V/H Divisions go in right column
                        const sliderGroup = createSliderGroup(item);
                        sliderGroup.style.minWidth = '80px';
                        setupLeadLineSliderState(sliderGroup, item, sliderUpdateFunctions);
                        rightColumn.appendChild(sliderGroup);
                    }
                }

                columnsContainer.appendChild(leftColumn);
                columnsContainer.appendChild(rightColumn);
                leadLinesSection.appendChild(columnsContainer);
                container.appendChild(leadLinesSection);

                // Wire up toggle change events AFTER section is in DOM
                const leadLinesToggleCheckbox = document.getElementById('showLeadLines');
                if (leadLinesToggleCheckbox) {
                    leadLinesToggleCheckbox.addEventListener('change', () => {
                        sliderUpdateFunctions.forEach(fn => fn());
                    });
                }

                // Initialize slider states after DOM is ready
                requestAnimationFrame(() => {
                    sliderUpdateFunctions.forEach(fn => fn());
                });
            }
        }

        // HELPER FUNCTION | Setup lead line slider disabled state
        // ------------------------------------------------------------
        function setupLeadLineSliderState(sliderGroup, item, updateFunctions) {
            if (!item.enabledBy) return;
            
            const slider = sliderGroup.querySelector('input[type="range"]');
            const valueDisplay = sliderGroup.querySelector('.cad-value-display');
            
            // Set initial disabled state
            if (slider && valueDisplay) {
                slider.disabled = true;
                sliderGroup.style.opacity = '0.4';
                sliderGroup.style.pointerEvents = 'none';
                valueDisplay.style.cursor = 'not-allowed';
            }
            
            const updateState = () => {
                const enablerCheckbox = document.getElementById(item.enabledBy);
                if (slider && valueDisplay) {
                    if (enablerCheckbox && enablerCheckbox.checked) {
                        slider.disabled = false;
                        sliderGroup.style.opacity = '1';
                        sliderGroup.style.pointerEvents = 'auto';
                        valueDisplay.style.cursor = 'pointer';
                    } else {
                        slider.disabled = true;
                        sliderGroup.style.opacity = '0.4';
                        sliderGroup.style.pointerEvents = 'none';
                        valueDisplay.style.cursor = 'not-allowed';
                    }
                }
            };
            
            updateFunctions.push(updateState);
        }
        // ---------------------------------------------------------------

        // FUNCTION | Create slider input group
        // ------------------------------------------------------------
        function createSliderGroup(def) {
            const group = document.createElement('div');
            group.className = 'cad-input-group';
            group.style.minWidth = '100px';

            // Label
            const label = document.createElement('label');
            label.htmlFor = def.id;
            label.textContent = def.label;
            label.style.fontSize = '0.75rem';
            label.style.fontWeight = '700';
            label.style.color = '#666';
            label.style.textTransform = 'uppercase';
            label.style.letterSpacing = '0.5px';
            label.style.marginBottom = '5px';
            group.appendChild(label);

            // Slider container
            const sliderContainer = document.createElement('div');
            sliderContainer.className = 'cad-slider-container';

            const sliderRow = document.createElement('div');
            sliderRow.className = 'cad-slider-row';
            sliderRow.style.display = 'flex';
            sliderRow.style.alignItems = 'center';
            sliderRow.style.gap = '8px';

            // Slider
            const slider = document.createElement('input');
            slider.type = 'range';
            slider.id = def.id;
            slider.min = def.min;
            slider.max = def.max;
            slider.step = def.step;
            slider.value = def.default;
            slider.style.flex = '1';

            // Value display
            const valueDisplay = document.createElement('div');
            valueDisplay.className = 'cad-value-display';
            valueDisplay.innerHTML = `${def.default}<span class="cad-unit">${def.unit}</span>`;
            valueDisplay.style.minWidth = '50px';
            valueDisplay.style.padding = '4px 6px';
            valueDisplay.style.background = '#f5f5f5';
            valueDisplay.style.border = '1px solid #ddd';
            valueDisplay.style.borderRadius = '4px';
            valueDisplay.style.fontSize = '0.8rem';
            valueDisplay.style.fontWeight = '600';
            valueDisplay.style.textAlign = 'center';

            // Events (only fires when slider is enabled)
            slider.addEventListener('input', () => {
                if (slider.disabled) return; // Safety check
                valueDisplay.innerHTML = `${slider.value}<span class="cad-unit">${def.unit}</span>`;
                initMullionOpeningWidths();
                renderPipeline({ preserveCamera: true });
            });

            // Double-click to edit (only if slider is enabled)
            valueDisplay.addEventListener('dblclick', () => {
                if (slider.disabled) return; // Don't allow editing when disabled
                const newVal = prompt(`Enter ${def.label} (${def.min}-${def.max}):`, slider.value);
                if (newVal !== null && !isNaN(newVal)) {
                    slider.value = Math.max(def.min, Math.min(def.max, parseInt(newVal)));
                    valueDisplay.innerHTML = `${slider.value}<span class="cad-unit">${def.unit}</span>`;
                    initMullionOpeningWidths();
                    renderPipeline({ preserveCamera: true });
                }
            });
            valueDisplay.style.cursor = 'pointer';

            sliderRow.appendChild(slider);
            sliderRow.appendChild(valueDisplay);
            sliderContainer.appendChild(sliderRow);
            group.appendChild(sliderContainer);

            return group;
        }
        // ---------------------------------------------------------------

        // FUNCTION | Create toggle group
        // ------------------------------------------------------------
        function createToggleGroup(def) {
            const group = document.createElement('div');
            group.className = 'toggle-group';

            const toggleSwitch = document.createElement('label');
            toggleSwitch.className = 'toggle-switch';

            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.id = def.id;
            checkbox.checked = def.default;

            const slider = document.createElement('span');
            slider.className = 'toggle-slider';

            toggleSwitch.appendChild(checkbox);
            toggleSwitch.appendChild(slider);

            const label = document.createElement('span');
            label.className = 'toggle-label';
            label.textContent = def.label;

            checkbox.addEventListener('change', () => {
                renderPipeline({ preserveCamera: true });
            });

            group.appendChild(toggleSwitch);
            group.appendChild(label);

            return group;
        }

        // UI event handlers, drag handlers, camera change handlers

        // -----------------------------------------------------------------------------
        // UI Event Handlers
        // -----------------------------------------------------------------------------
        const UI_HANDLERS = {
            // Real-time update on any slider change (preserves camera)
            onParamChange: (paramId, value) => {
                renderPipeline({ preserveCamera: true });
            },
            
            // Mullion count changed - reset to even widths
            onMullionChange: (paramId, value) => {
                initMullionOpeningWidths();
                renderPipeline({ preserveCamera: true });
            },
            
            // Full reset with view reset and even opening widths
            onReset: () => {
                initMullionOpeningWidths();
                // Reset camera to origin at 1:1 scale
                const Viewport = window.CadGenerator.Viewport;
                Viewport.setState({ x: 0, y: 0, scale: 1 });
                renderPipeline({ preserveCamera: true });  // Preserve camera (now at origin)
            },
            
            // DXF export
            onDownloadDXF: () => downloadDXF()
        };

        // =============================================================================
        // REGION | Render Pipeline (Combined)
        // =============================================================================
        // Unified rendering pipeline consolidating all rendering steps
        // =============================================================================

        // FUNCTION | Unified render pipeline
        // ------------------------------------------------------------
        // Single entry point for all rendering operations
        // Consolidates: model generation, viewport rendering, layer styling, and status updates
        // ------------------------------------------------------------
        function renderPipeline(options = {}) {
            const {
                preserveCamera = false,
                skipDimensions = false
            } = options;

            const UI       = window.CadGenerator.DynamicUI;
            const Viewport = window.CadGenerator.Viewport;
            const M        = Viewport.getMakerJS();

            if (!M) {
                UI.setStatus('Error: Maker.js library not loaded.');
                return false;
            }

            try {
                // Step 1: Normalize data
                normalizeMullionOpeningWidths();
                
                // Step 2: Generate CAD model
                currentModel = generateWindow(M);
                
                // Step 3: Render geometry (Viewport)
                Viewport.render(currentModel, guidesConfig, { 
                    preserveCamera: preserveCamera 
                });
                
                // Step 4: Apply layer styles (dimension colors, casement strokes)
                applyLayerStyles();
                
                // Step 5: Update status bar
                const numMullions  = parseInt(UI.getValue('mullions'));
                const numOpenings  = numMullions + 1;
                const hBars        = parseInt(UI.getValue('hGlazeBars'));
                const vBars        = parseInt(UI.getValue('vGlazeBars'));
                const cillText     = getShowCill() ? ' + Cill' : '';
                const dimText      = getShowDimensions() ? ' + Dims' : '';
                
                let statusText = '';
                if (numMullions === 0) {
                    statusText = `Single opening (no mullions), ${hBars}×${vBars} glaze bars${cillText}${dimText}.`;
                } else {
                    statusText = `${numMullions} mullion${numMullions !== 1 ? 's' : ''} (${numOpenings} opening${numOpenings !== 1 ? 's' : ''}), ${hBars}×${vBars} glaze bars${cillText}${dimText}.`;
                }
                UI.setStatus(statusText);

                return true;
            } catch (e) {
                UI.setStatus('Error: ' + e.message);
                return false;
            }
        }

        // ---------------------------------------------------------------------
        // REGION | Initialization
        // ---------------------------------------------------------------------
        window.onload = function() {
            const UI       = window.CadGenerator.DynamicUI;
            const Viewport = window.CadGenerator.Viewport;

            // Build primary UI from config
            UI.build(UI_CONFIG, UI_HANDLERS);

            // Build secondary controls
            buildSecondaryControls();

            // Initialize viewport (no guides for window configurator)
            Viewport.init('canvas-wrapper', {
                strokeColor:    COLOR_STROKE,
                strokeWidth:    STROKE_WIDTH,
                fillColor:      COLOR_FILL,
                showGroundLine: false,
                showAxisLine:   false,
                fitPadding:     VIEWPORT_FIT_PADDING
            });

            // Register render callback for post-render operations
            Viewport.onRender((model, bounds) => {
                // Post-render operations can be added here if needed
            });

            // Initialize opening widths
            initMullionOpeningWidths();

            // Load CAD font FIRST, then wait for MakerJS and render
            loadCADFont()
                .then(() => {
                    console.log('Font ready - starting initial render');
                    
                    // Wait for MakerJS to load, then render
                    let attempts = 0;
                    const checkInt = setInterval(() => {
                        const M = Viewport.getMakerJS();
                        if (M) {
                            clearInterval(checkInt);
                            UI.showLoading(false);
                            
                            // Initial render with fit-to-view (fitToView is called automatically in render())
                            renderPipeline({ preserveCamera: false });
                        } else if (attempts > 10) {
                            clearInterval(checkInt);
                            UI.setStatus('Failed to load libraries. Check connection.');
                        }
                        attempts++;
                    }, 100);
                })
                .catch((err) => {
                    console.warn('Font failed - rendering without text:', err);
                    
                    // Render anyway without text
                    let attempts = 0;
                    const checkInt = setInterval(() => {
                        const M = Viewport.getMakerJS();
                        if (M) {
                            clearInterval(checkInt);
                            UI.showLoading(false);
                            
                            // Initial render with fit-to-view (fitToView is called automatically in render())
                            renderPipeline({ preserveCamera: false });
                        } else if (attempts > 10) {
                            clearInterval(checkInt);
                            UI.setStatus('Failed to load libraries. Check connection.');
                        }
                        attempts++;
                    }, 100);
                });
        };
