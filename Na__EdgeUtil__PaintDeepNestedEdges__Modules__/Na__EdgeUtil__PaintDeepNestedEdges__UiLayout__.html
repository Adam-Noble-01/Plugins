<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{{DIALOG_TITLE}}</title>
    <style>
{{STYLESHEET_CONTENT}}
    </style>
</head>

<!-- ----------------------------------------------------------------- -->
<!-- REGION | User Interface HTML Layout & Elements                    -->
<!-- ----------------------------------------------------------------- -->

<body>

    <!-- ----------------------------------------------------------------- -->
    <!-- UI MENU | Colour Selection and Edge Information Display           -->
    <!-- ----------------------------------------------------------------- -->

    <label for="colour">Choose edge colour:</label>
    <select id="colour">{{OPTIONS_HTML}}</select>
    <p id="info">{{INITIAL_INFO}}</p>

    <!-- ----------------------------------------------------------------- -->
    <!-- UI MENU | Dynamic Quick Palette Swatches                           -->
    <!-- ----------------------------------------------------------------- -->

    <div class="naQuickPalettePanel">
        <p class="naQuickPalettePanel__Title">Quick palettes:</p>
        <div id="quickPaletteRow">{{DYNAMIC_PALETTE_HTML}}</div>
    </div>

    <!-- ----------------------------------------------------------------- -->
    <!-- UI MENU | Action Button Controls                                  -->
    <!-- ----------------------------------------------------------------- -->

    <div id="btnRow">
        <button onclick="sketchup.fetch_selection()">Refresh Selection</button>
        <button onclick="sketchup.apply_colour(document.getElementById('colour').value)"><strong>Paint Edges</strong></button>
    </div>

</body>

<!-- endregion ----------------------------------------------------------------- -->
</html>
