<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN">
<html>
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Joint configuration</title>
    <link href='https://fonts.googleapis.com/css?family=Nunito:400,300' rel='stylesheet' type='text/css'>
    <link href="css/Style.css" rel="stylesheet">
    <script language="Javascript" type="text/javascript">
        function select_axis() {
            window.location = 'skp:select_axis';
        }

        function during_axis_select() {
            document.getElementById('joint_type').disabled = true;
            document.getElementById('Select').disabled = true;
        }

        function after_axis_select() {
            document.getElementById('joint_type').disabled = false;
            document.getElementById('Select').disabled = false;
        }

        function set_open_pos() {
            window.location = 'skp:set_open_position';
        }

        function set_close_pos() {
            window.location = 'skp:set_close_position';
        }

        function commit() {
            window.location = 'skp:commit@' + getData();
        }

        function close_window() {
            window.location = 'skp:close_window';
        }

        function getData() {
            data = {
                'joint_type': document.getElementById("joint_type").value,
                'animation_time': document.getElementById("animation_time").value
            };
            return JSON.stringify(data)
        }

        function setData(data) {
            document.getElementById("joint_type").value = data['joint_type'];
            document.getElementById("animation_time").value = data['animation_time'];
        }

        function requestData() {
            window.location = 'skp:request_data';
        }

        document.onkeydown = function (evt) {
            evt = evt || window.event;
            let isEscape = false;
            if ("key" in evt) {
                isEscape = (evt.key === "Escape" || evt.key === "Esc");
            } else {
                isEscape = (evt.keyCode === 27);
            }
            if (isEscape) {
                close_window();
            }
        };

        window.onload = function () {
            requestData();
        }


    </script>
</head>
<body>
<div>
    <form action="#" name="form">
        <table id="tytuł">
            <tr>
                <td colspan="4" style="display: none;">
                    <h1>
                        <label> </label>
                    </h1>
                </td>
            </tr>
            <tr>
                <td class="first_col">
                    <label>Joint type</label>
                </td>
                <td>
                    <select id="joint_type"
                            onchange="commit()"
                            style="">
                        <option value=""></option>
                        <option value="slide">slider</option>
                        <option value="hinge">hinge</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>
                    <label>Joint axis</label>
                </td>
                <td>
                    <input id="Select"
                           onClick="select_axis();during_axis_select()"
                           type="button"
                           value="Select">
            </tr>
            <tr>
                <td>
                    <label>Set position</label>
                </td>
                <td>
                    <div style=" display: inline-flex">
                        <input id="set_open" onClick="set_open_pos()"
                               style="min-width: 50% "
                               type="button"
                               value="Open">
                        <input id="set_close" onClick="set_close_pos()"
                               style=""
                               type="button"
                               value="Close">
                    </div>
            </tr>
            <tr>
                <td>
                    <label>Animation Time </label>
                </td>
                <td>
                    <input id="animation_time"
                           max="10"
                           min="0"
                           onChange="commit()"
                           step="1"
                           type="number"
                           value="1">
                </td>
                <td>
                    <label>s</label>
                </td>
            </tr>
            <tr class="blank_row">
                <td colspan="3"></td>
            </tr>
            <tr>
                <td align="center" colspan="3" style="padding-top: 10px;padding-bottom: 5px;">
                    <input id="Close"
                           onClick="close_window()"
                           type="button"
                           value="Close window">
                </td>
            </tr>

        </table>

    </form>
</div>
</body>
</html>
